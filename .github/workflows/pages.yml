name: Build and deploy static weather site

on:
  workflow_dispatch:
  schedule:
    - cron: "13,43 * * * *"
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Restore persisted weather history
        run: |
          python -m app.cli init-db
          python -m app.cli import-readings-csv --csv data/github_pages_readings.csv

      - name: Collect latest SMG data
        run: |
          python -m app.cli collect-once
          python -m app.cli export-readings-csv --csv data/github_pages_readings.csv

      - name: Commit updated weather history
        run: |
          if [ -z "$(git status --porcelain -- data/github_pages_readings.csv)" ]; then
            echo "No weather history changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/github_pages_readings.csv
            git commit -m "Update weather history [skip ci]"
            git push
          fi

      - name: Build static Pages artifact
        run: |
          python -m app.export_static
          cp dist/offline.html dist/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
